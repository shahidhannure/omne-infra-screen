name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  IMAGE_TAG: ${{ github.ref_name }}-${{ github.sha && github.sha || 'local' }}

jobs:
  # ── 1. .NET build + unit tests ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Omne.Screen.sln

      - name: Build
        run: dotnet build Omne.Screen.sln -c Release --no-restore

      - name: Test
        run: |
          dotnet test Omne.Screen.sln -c Release --no-build \
            --logger "trx;LogFileName=results.trx" \
            --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/*.trx

  # ── 2. React UI build ───────────────────────────────────────────────────────
  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/ui/package-lock.json

      - name: Install
        run: npm ci
        working-directory: src/ui

      - name: Build
        run: npm run build
        working-directory: src/ui

  # ── 3. Build Docker images ──────────────────────────────────────────────────
  build-images:
    runs-on: ubuntu-latest
    needs: [test, build-ui]
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "tag=${{ github.ref_name }}-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build API image
        run: |
          docker build \
            -f src/Api/Dockerfile \
            -t omne-api:${{ steps.tag.outputs.tag }} \
            .

      - name: Build BFF image
        run: |
          docker build \
            -f src/Bff/Dockerfile \
            -t omne-bff:${{ steps.tag.outputs.tag }} \
            .

      - name: Build UI image
        run: |
          docker build \
            -f src/ui/Dockerfile \
            -t omne-ui:${{ steps.tag.outputs.tag }} \
            .

      # Save the API image for the scan job (avoids a rebuild)
      - name: Export API image
        run: docker save omne-api:${{ steps.tag.outputs.tag }} -o /tmp/omne-api.tar

      - name: Upload API image tar
        uses: actions/upload-artifact@v4
        with:
          name: omne-api-image
          path: /tmp/omne-api.tar
          retention-days: 1

