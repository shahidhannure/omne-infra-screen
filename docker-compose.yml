services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: omne_screen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - omne-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d omne_screen"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    environment:
      ConnectionStrings__OmneScreen: "Host=postgres;Port=5432;Database=omne_screen;Username=postgres;Password=postgres"
      ASPNETCORE_ENVIRONMENT: Production
    networks:
      - omne-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  bff:
    build:
      context: .
      dockerfile: src/Bff/Dockerfile
    environment:
      ReverseProxy__Clusters__api-cluster__Destinations__api__Address: "http://api:5080/"
      ASPNETCORE_ENVIRONMENT: Production
    networks:
      - omne-net
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5100/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    build:
      context: .
      dockerfile: src/ui/Dockerfile
    ports:
      - "8080:80"
    networks:
      - omne-net
    depends_on:
      bff:
        condition: service_healthy

networks:
  omne-net:
    driver: bridge

volumes:
  pgdata:
